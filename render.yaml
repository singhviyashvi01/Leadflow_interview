services:
  - type: web
    name: leadflow-backend
    runtime: python
    rootDir: config
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "leadflow-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-app.vercel.app"   # ← update after Vercel deploy
      - key: DATABASE_URL
        fromDatabase:
          name: leadflow-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.0"

databases:
  - name: leadflow-db
    databaseName: leadflow
    user: leadflow
    plan: free
